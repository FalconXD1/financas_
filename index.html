<!doctype html>
<html lang="pt-BR">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinançasPessoais — João</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
/* ==========================================
         ESTILOS GERAIS E VARIÁVEIS
         ========================================== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0f1117;
        --bg2: #181c27;
        --bg3: #1e2233;
        --card: #242840;
        --border: rgba(255, 255, 255, 0.07);
        --border2: rgba(255, 255, 255, 0.12);
        --text: #e8eaf0;
        --text2: #8b90a0;
        --text3: #555a6e;
        --accent: #4f8ef7;
        --accent2: #3a6fd4;
        --green: #2ec08a;
        --red: #f05c5c;
        --amber: #f5a623;
        --purple: #9b7cf4;
        --radius: 10px;
        --radius-lg: 14px;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ==========================================
         LOGIN (RESPONSIVO)
         ========================================== */
      #login-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .login-card {
        background: var(--bg2);
        border: 1px solid var(--border2);
        border-radius: 20px;
        padding: 30px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
      }

      /* ==========================================
         LAYOUT PRINCIPAL (MOBILE FIRST)
         ========================================== */
      #app-screen {
        display: none;
        flex-direction: column;
      }

      /* Sidebar vira Bottom Nav no Mobile */
      .sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 65px;
        width: 100%;
        background: var(--bg2);
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
        padding: 0 10px;
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 8px;
        cursor: pointer;
        font-size: 10px;
        color: var(--text2);
        flex: 1;
        text-align: center;
      }

      .nav-item.active {
        color: var(--accent);
        background: rgba(79, 142, 247, 0.05);
        border-radius: 8px;
      }

      .main {
        margin-left: 0;
        padding-bottom: 80px; /* Espaço para a barra inferior */
        width: 100%;
      }

      .topbar {
        padding: 15px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 15px;
        background: rgba(15, 17, 23, 0.9);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 0;
        z-index: 900;
      }

      .content {
        padding: 20px;
      }

      /* ==========================================
         MÉTRICAS E CARDS
         ========================================== */
      .metrics {
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* 2 por linha no mobile */
        gap: 12px;
        margin-bottom: 20px;
      }

      .metric {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 15px;
      }

      .metric-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--text3);
        text-transform: uppercase;
        margin-bottom: 5px;
      }

      .metric-value {
        font-size: 18px;
        font-weight: 600;
        font-family: "DM Mono", monospace;
        word-break: break-all;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 20px;
        margin-bottom: 20px;
        overflow-x: auto; /* Permite scroll lateral em tabelas */
      }

      /* ==========================================
         TABELAS E FORMULÁRIOS
         ========================================== */
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 500px; /* Força o scroll em telas pequenas */
      }

      th {
        text-align: left;
        font-size: 10px;
        color: var(--text3);
        padding: 10px;
        border-bottom: 1px solid var(--border);
      }

      td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr; /* Coluna única no mobile */
        gap: 15px;
      }

      .form-group input, .form-group select, .form-group textarea {
        width: 100%;
        padding: 12px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        color: var(--text);
        border-radius: 10px;
      }

      .btn {
        width: 100%; /* Botões largos no mobile */
        padding: 12px;
        border-radius: 10px;
        font-weight: 600;
        margin-top: 5px;
      }

      /* ==========================================
         DESKTOP ADJUSTMENTS (TELAS > 768px)
         ========================================== */
      @media (min-width: 768px) {
        .sidebar {
          position: fixed;
          left: 0;
          top: 0;
          bottom: 0;
          width: 240px;
          height: 100vh;
          flex-direction: column;
          justify-content: flex-start;
          padding: 30px 15px;
        }
        .nav-item {
          flex-direction: row;
          font-size: 14px;
          padding: 12px 15px;
          margin-bottom: 5px;
          text-align: left;
        }
        .main {
          margin-left: 240px;
          padding-bottom: 0;
        }
        .topbar {
          flex-direction: row;
          padding: 20px 32px;
        }
        .metrics {
          grid-template-columns: repeat(4, 1fr);
        }
        .form-grid {
          grid-template-columns: 1fr 1fr;
        }
        .btn {
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="login-screen">
      <div class="login-card">
        <div class="login-group">
          <label>Usuário</label
          ><input type="text" id="l-user" placeholder="Usuário" />
        </div>
        <div class="login-group">
          <label>Senha</label
          ><input type="password" id="l-pass" placeholder="••••••••" />
        </div>
        <button class="login-btn" onclick="doLogin()">Entrar</button>
      </div>
    </div>

    <div id="app-screen">
      <div class="sidebar">
        <nav class="nav-section" style="padding-top: 20px">
          <div class="nav-item active" onclick="showPage('dashboard', this)">
            📊 Resumo
          </div>
          <div class="nav-item" onclick="showPage('lancamentos', this)">
            📋 Lançamentos
          </div>
          <div class="nav-item" onclick="showPage('prazos', this)">
            🗓 Prazos
          </div>
          <div class="nav-item" onclick="showPage('relatorios', this)">
            📈 Relatórios
          </div>
        </nav>
      </div>

      <div class="main">
        <div class="topbar">
          <div class="page-title" id="page-title">Resumo Geral</div>
          <button
            class="btn btn-primary"
            onclick="
              showPage('lancamentos');
              openForm();
            "
          >
            + Novo Registro
          </button>
        </div>

        <div class="content">
          <div id="page-dashboard" class="page active">
            <div
              style="
                margin-bottom: 20px;
                display: flex;
                align-items: center;
                gap: 12px;
              "
            >
              <label
                style="
                  font-size: 11px;
                  font-weight: 600;
                  color: var(--text3);
                  text-transform: uppercase;
                "
                >Resumo de:</label
              >
              <select
                id="filtro-usuario"
                onchange="renderTudo()"
                style="
                  padding: 8px 12px;
                  background: var(--bg3);
                  border: 1px solid var(--border2);
                  color: var(--text);
                  border-radius: 8px;
                "
              >
                <option value="todos">Todos</option>
                <option value="Felipe">Felipe</option>
                <option value="João">João</option>
                <option value="Annia">Annia</option>
              </select>
            </div>
            <div class="metrics" id="metrics-cards"></div>
            <div class="card">
              <canvas id="mainChart" style="max-height: 280px"></canvas>
            </div>
          </div>

          <div id="page-lancamentos" class="page" style="display: none">
            <div id="form-lancamento" class="form-panel">
              <div class="form-grid">
                <div class="form-group">
                  <label>Tipo</label
                  ><select id="f-tipo">
                    <option value="saida">Saída</option>
                    <option value="entrada">Entrada</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Valor (R$)</label
                  ><input type="number" id="f-valor" step="0.01" />
                </div>
                <div class="form-group">
                  <label>Categoria</label
                  ><select id="f-cat">
                    <option>Salário</option>
                    <option>Alimentação</option>
                    <option>Transporte</option>
                    <option>Lazer</option>
                    <option>Saúde</option>
                    <option>Fixos</option>
                    <option>Outros</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Data</label><input type="date" id="f-data" />
                </div>
                <div class="form-group">
                  <label>Status</label
                  ><select id="f-status">
                    <option value="pago">Pago</option>
                    <option value="pendente">Pendente</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Responsável</label
                  ><select id="f-usuario">
                    <option value="Felipe">Felipe</option>
                    <option value="João">João</option>
                    <option value="Annia">Annia</option>
                  </select>
                </div>
                <div class="form-group" style="grid-column: 1/-1">
                  <label>Descrição</label><textarea id="f-desc"></textarea>
                </div>
              </div>
              <div style="margin-top: 20px">
                <button class="btn btn-primary" onclick="salvarNoBanco()">
                  Salvar</button
                ><button
                  class="btn"
                  onclick="closeForm()"
                  style="background: #444; color: white"
                >
                  Cancelar
                </button>
              </div>
            </div>
            <div class="card">
              <table>
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Categoria</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="tb-corpo"></tbody>
              </table>
            </div>
          </div>

          <div id="page-prazos" class="page" style="display: none">
            <div id="alerta-prazos"></div>
            <div class="card">
              <h3>Calendário de Vencimentos</h3>
              <div id="calendar"></div>
            </div>
            <div class="card" style="margin-top: 24px">
              <h3>Pendências</h3>
              <table>
                <thead>
                  <tr>
                    <th>Vencimento</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="tb-prazos"></tbody>
              </table>
            </div>
          </div>

          <div id="page-relatorios" class="page" style="display: none">
            <div class="card" style="max-width: 500px; margin: 0 auto">
              <canvas id="pizzaChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const SB_URL = "https://zgcimyinowcgwegsjilq.supabase.co";
      const SB_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnY2lteWlub3djZ3dlZ3NqaWxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDQ5ODMsImV4cCI6MjA5MDEyMDk4M30.y6pXC74FIfwSAeb6uP3WhftbQ82pVPKchOdQwKKxZJY";
      const _supabase = supabase.createClient(SB_URL, SB_KEY);

      let lancamentos = [],
        meuGraficoLinha = null,
        meuGraficoPizza = null,
        calendar = null,
        editandoId = null;
      const fmt = (v) =>
        "R$ " + (v || 0).toLocaleString("pt-BR", { minimumFractionDigits: 2 });

      function doLogin() {
        if (
          document.getElementById("l-user").value === "barbosas" &&
          document.getElementById("l-pass").value === "barbosa.2026"
        ) {
          sessionStorage.setItem("auth_joao", "true");
          document.getElementById("login-screen").style.display = "none";
          document.getElementById("app-screen").style.display = "block";
          carregarDados();
        } else alert("Acesso negado!");
      }

      async function carregarDados() {
        const { data, error } = await _supabase
          .from("lancamentos2")
          .select("*")
          .order("data", { ascending: true });
        if (!error) {
          lancamentos = data;
          renderTudo();
        }
      }

      async function salvarNoBanco() {
        const dados = {
          tipo: document.getElementById("f-tipo").value,
          cat: document.getElementById("f-cat").value,
          data: document.getElementById("f-data").value,
          valor: parseFloat(document.getElementById("f-valor").value),
          status: document.getElementById("f-status").value,
          description: document.getElementById("f-desc").value || "",
          usuario: document.getElementById("f-usuario").value,
        };
        if (editandoId)
          await _supabase
            .from("lancamentos2")
            .update(dados)
            .eq("id", editandoId);
        else await _supabase.from("lancamentos2").insert([dados]);
        closeForm();
        carregarDados();
      }

      async function marcarComoPago(id) {
        await _supabase
          .from("lancamentos2")
          .update({ status: "pago" })
          .eq("id", id);
        carregarDados();
      }

      async function deletar(id) {
        if (confirm("Excluir permanentemente?")) {
          await _supabase.from("lancamentos2").delete().eq("id", id);
          carregarDados();
        }
      }

      function renderTudo() {
        const filtroUser = document.getElementById("filtro-usuario").value;
        const hoje = new Date().toISOString().split("T")[0];
        let dadosFiltrados = lancamentos.filter(
          (l) => filtroUser === "todos" || l.usuario === filtroUser,
        );

        let ent = 0,
          sai = 0,
          pen = 0,
          categoriasSoma = {};
        const corpo = document.getElementById("tb-corpo"),
          corpoPrazos = document.getElementById("tb-prazos");
        corpo.innerHTML = "";
        corpoPrazos.innerHTML = "";
        let eventos = [],
          vencidos = 0;

        [...dadosFiltrados].reverse().forEach((l) => {
          const valor = parseFloat(l.valor) || 0;
          if (l.status === "pago") {
            if (l.tipo === "entrada") ent += valor;
            else {
              sai += valor;
              categoriasSoma[l.cat] = (categoriasSoma[l.cat] || 0) + valor;
            }
          } else {
            pen += valor;
            if (l.data < hoje) vencidos++;
            corpoPrazos.innerHTML += `<tr><td>${l.data}</td><td>${l.description}</td><td>${fmt(valor)}</td><td><button onclick="marcarComoPago('${l.id}')">✔</button></td></tr>`;
            eventos.push({
              title: l.description,
              start: l.data,
              backgroundColor: l.data < hoje ? "#f05c5c" : "#f5a623",
            });
          }

          corpo.innerHTML += `<tr>
            <td>${l.data}</td>
            <td>${l.description || "---"}<br><small style="color:var(--accent)">Por: ${l.usuario}</small></td>
            <td><span class="badge badge-gray">${l.cat}</span></td>
            <td class="${l.tipo === "entrada" ? "green" : "red"}">${fmt(valor)}</td>
            <td><span class="badge ${l.status === "pago" ? "badge-green" : "badge-amber"}">${l.status}</span></td>
            <td><button onclick="deletar('${l.id}')">✖</button></td>
          </tr>`;
        });

        document.getElementById("metrics-cards").innerHTML = `
          <div class="metric"><div class="metric-label">Entradas</div><div class="metric-value green" style="color:var(--green)">${fmt(ent)}</div></div>
          <div class="metric"><div class="metric-label">Saídas</div><div class="metric-value red" style="color:var(--red)">${fmt(sai)}</div></div>
          <div class="metric"><div class="metric-label">Saldo</div><div class="metric-value blue" style="color:var(--accent)">${fmt(ent - sai)}</div></div>
          <div class="metric"><div class="metric-label">Pendente</div><div class="metric-value amber" style="color:var(--amber)">${fmt(pen)}</div></div>`;

        inicializarCalendario(eventos);
        desenharGraficoLinha(dadosFiltrados);
        desenharGraficoPizza(categoriasSoma);
      }

      function desenharGraficoLinha(dados) {
        const ctx = document.getElementById("mainChart").getContext("2d");
        if (meuGraficoLinha) meuGraficoLinha.destroy();
        meuGraficoLinha = new Chart(ctx, {
          type: "line",
          data: {
            labels: dados.map((l) => l.data),
            datasets: [
              {
                label: "Fluxo",
                data: dados.map((l) =>
                  l.tipo === "entrada" ? l.valor : -l.valor,
                ),
                borderColor: "#4f8ef7",
                tension: 0.4,
              },
            ],
          },
        });
      }

      function desenharGraficoPizza(resumo) {
        const ctx = document.getElementById("pizzaChart").getContext("2d");
        if (meuGraficoPizza) meuGraficoPizza.destroy();
        meuGraficoPizza = new Chart(ctx, {
          type: "doughnut",
          data: {
            labels: Object.keys(resumo),
            datasets: [
              {
                data: Object.values(resumo),
                backgroundColor: ["#4f8ef7", "#2ec08a", "#f5a623", "#f05c5c"],
              },
            ],
          },
        });
      }

      function inicializarCalendario(evs) {
        const el = document.getElementById("calendar");
        if (calendar) calendar.destroy();
        calendar = new FullCalendar.Calendar(el, {
          initialView: "dayGridMonth",
          locale: "pt-br",
          events: evs,
          height: 450,
        });
        calendar.render();
      }

      function showPage(p, el) {
        document
          .querySelectorAll(".page")
          .forEach((d) => (d.style.display = "none"));
        document.getElementById("page-" + p).style.display = "block";
        document
          .querySelectorAll(".nav-item")
          .forEach((i) => i.classList.remove("active"));
        if (el) el.classList.add("active");
        if (p === "prazos" && calendar)
          setTimeout(() => calendar.updateSize(), 50);
      }

      function openForm() {
        document.getElementById("form-lancamento").style.display = "block";
      }
      function closeForm() {
        document.getElementById("form-lancamento").style.display = "none";
        editandoId = null;
      }

      if (sessionStorage.getItem("auth_joao") === "true") {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app-screen").style.display = "block";
        carregarDados();
      }
    </script>
  </body>
</html>
